# https://docs.4gaboards.com/docs/dev/install/docker-vars
#
# Production behind an existing nginx proxy (TLS only on nginx):
#   1) Create a dedicated network once: docker network create 4gaboards_net
#   2) Attach your nginx proxy container to external network 4gaboards_net
#   3) proxy_pass http://fourgaboards-app:1337 (container listens on 1337, not 3000)
#   4) Set BASE_URL to the URL the app should use (http://…); browsers still hit nginx on https://

services:
  db:
    image: postgres:16-alpine
    restart: always
    networks:
      - boards-network
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: 4gaBoards
      POSTGRES_PASSWORD: notpassword
      POSTGRES_INITDB_ARGS: '-A scram-sha-256'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d 4gaBoards']
      interval: 5s
      timeout: 5s
      retries: 20

  4gaBoards:
    image: ghcr.io/rargames/4gaboards:latest
    # To build from this repository instead: comment `image` and uncomment:
    # build: .
    container_name: fourgaboards-app
    restart: always
    networks:
      - boards-network
    volumes:
      - user-avatars:/app/public/user-avatars
      - project-background-images:/app/public/project-background-images
      - attachments:/app/private/attachments
    # App listens on 1337; nginx on the Docker network uses http://fourgaboards-app:1337.
    # Optional: map host port 3000 -> 1337 for local debugging only (not required for nginx).
    # ports:
    #   - 3000:1337
    environment:
      BASE_URL: http://4ga.gamersanon.home
      SECRET_KEY: notsecretkey
      DATABASE_URL: postgresql://postgres:notpassword@db/4gaBoards
      NODE_ENV: production
      ## Add optional 4ga Boards instance variables here
    depends_on:
      db:
        condition: service_healthy

volumes:
  user-avatars:
  project-background-images:
  attachments:
  db-data:
networks:
  boards-network:
    name: 4gaboards_net
    external: true
